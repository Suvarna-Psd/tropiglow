<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join TropiGlow</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="Images/TropiGlow.png" alt="TropiGlow Logo">
        </a>
    </div>
    
        <nav class="nav-links">
        <a href="about.html">About Us</a>
        <a href="shop.html">Shop</a>
        <a href="quiz.html">Skin Quiz</a>
        <a href="blog.html">Blog / Tips</a>
        <a href="contact.html">Contact Us</a>
    </nav>
</header>

<section class="contact-section">

    <h1>Join TropiGlow </h1>
    <p>Create your account to get personalized glow tips!</p>

    <form class="contact-form" onsubmit="return validateForm()">

        <input type="text" id="name" placeholder="Full Name">
        <small class="error" id="nameError"></small>

        <input type="email" id="email" placeholder="Email Address">
        <small class="error" id="emailError"></small>

        <input type="password" id="password" placeholder="Create Password">
        <small class="error" id="passwordError"></small>

        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <small class="error" id="confirmError"></small>

        <button type="submit">Sign Up</button>

    </form>

</section>

<script src="script.js"></script>

</body>
</html>
